<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>World Cup 2026 — Top Scorers</title>
<style>
  :root {
    color-scheme: dark;
    --bg: #0d1117;
    --panel: #161b22;
    --border: #262e38;
    --text: #e6edf3;
    --muted: #8b949e;
    --accent: #3fb950;
    --gold: #ffd54a;
    --silver: #c9d1d9;
    --bronze: #d99a5f;
    --error: #f85149;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    min-height: 100vh;
    background: radial-gradient(circle at top, #131922 0%, var(--bg) 55%);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    display: flex;
    justify-content: center;
    padding: 32px 16px 64px;
  }
  .app {
    width: 100%;
    max-width: 640px;
  }
  header {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 16px;
    margin-bottom: 8px;
  }
  h1 {
    font-size: 1.5rem;
    margin: 0 0 4px;
    letter-spacing: -0.02em;
  }
  .subtitle {
    color: var(--muted);
    font-size: 0.85rem;
    margin: 0;
  }
  button#refreshBtn {
    background: var(--panel);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 8px 14px;
    border-radius: 8px;
    font-size: 0.85rem;
    cursor: pointer;
    white-space: nowrap;
    transition: background 0.15s ease, border-color 0.15s ease;
  }
  button#refreshBtn:hover:not(:disabled) {
    background: #1c232c;
    border-color: #38424e;
  }
  button#refreshBtn:disabled {
    opacity: 0.5;
    cursor: default;
  }
  .meta-row {
    display: flex;
    align-items: center;
    gap: 10px;
    color: var(--muted);
    font-size: 0.78rem;
    margin: 14px 0 20px;
  }
  .dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: var(--muted);
    flex-shrink: 0;
  }
  .dot.live { background: var(--accent); box-shadow: 0 0 0 3px rgba(63,185,80,0.18); }
  .dot.error { background: var(--error); }
  .banner {
    border: 1px solid var(--border);
    background: var(--panel);
    border-radius: 10px;
    padding: 14px 16px;
    font-size: 0.88rem;
    color: var(--muted);
    margin-bottom: 16px;
  }
  .banner.error { border-color: rgba(248,81,73,0.4); color: #ffb3ae; }
  .list {
    display: flex;
    flex-direction: column;
    gap: 8px;
  }
  .row {
    display: flex;
    align-items: center;
    gap: 14px;
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 10px 14px;
  }
  .row.top1 { border-color: rgba(255,213,74,0.5); background: linear-gradient(90deg, rgba(255,213,74,0.08), var(--panel) 40%); }
  .row.top2 { border-color: rgba(201,209,217,0.35); background: linear-gradient(90deg, rgba(201,209,217,0.07), var(--panel) 40%); }
  .row.top3 { border-color: rgba(217,154,95,0.4); background: linear-gradient(90deg, rgba(217,154,95,0.08), var(--panel) 40%); }
  .rank {
    width: 26px;
    text-align: center;
    font-weight: 700;
    font-size: 0.95rem;
    color: var(--muted);
    flex-shrink: 0;
  }
  .top1 .rank { color: var(--gold); }
  .top2 .rank { color: var(--silver); }
  .top3 .rank { color: var(--bronze); }
  .photo {
    width: 42px;
    height: 42px;
    border-radius: 50%;
    object-fit: cover;
    background: #1c232c;
    border: 1px solid var(--border);
    flex-shrink: 0;
  }
  .avatar-fallback {
    width: 42px;
    height: 42px;
    border-radius: 50%;
    background: #1c232c;
    border: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 0.8rem;
    font-weight: 600;
    color: var(--muted);
    flex-shrink: 0;
  }
  .info { flex: 1; min-width: 0; }
  .player-name {
    font-weight: 600;
    font-size: 0.95rem;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .team-name {
    color: var(--muted);
    font-size: 0.78rem;
  }
  .goals {
    font-size: 1.15rem;
    font-weight: 700;
    min-width: 28px;
    text-align: right;
    flex-shrink: 0;
  }
  footer {
    margin-top: 32px;
    text-align: center;
    font-size: 0.75rem;
    color: var(--muted);
  }
  footer a { color: var(--muted); }
  .tabs {
    display: flex;
    gap: 6px;
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 4px;
    margin-bottom: 16px;
  }
  .tab {
    flex: 1;
    background: transparent;
    border: none;
    color: var(--muted);
    padding: 8px 10px;
    border-radius: 7px;
    font-size: 0.82rem;
    font-weight: 600;
    cursor: pointer;
  }
  .tab.active {
    background: #1f2733;
    color: var(--text);
  }
  .subtabs {
    max-width: 220px;
    padding: 3px;
    margin-bottom: 10px;
  }
  .subtabs .tab {
    padding: 6px 8px;
    font-size: 0.76rem;
  }
  .assist-note {
    color: var(--muted);
    font-size: 0.76rem;
    margin: -2px 0 12px;
    line-height: 1.4;
  }
  @media (max-width: 480px) {
    body { padding: 20px 12px 48px; }
    header { flex-wrap: wrap; }
    h1 { font-size: 1.2rem; }
    button#refreshBtn { padding: 7px 12px; font-size: 0.8rem; }
    .row { padding: 8px 10px; gap: 10px; }
    .photo, .avatar-fallback { width: 36px; height: 36px; }
    .player-name { font-size: 0.88rem; }
    .goals { font-size: 1rem; }
  }
</style>

<div class="app">
  <header>
    <div>
      <h1>2026 FIFA World Cup — Top Scorers</h1>
      <p class="subtitle">Live goal-scorer rankings, updated automatically</p>
    </div>
    <button id="refreshBtn">Refresh now</button>
  </header>

  <div class="tabs">
    <button class="tab active" id="tabTournament">This Tournament</button>
    <button class="tab" id="tabAllTime">All-Time</button>
  </div>

  <div class="tabs subtabs" id="metricToggle">
    <button class="tab active" id="metricGoals">Goals</button>
    <button class="tab" id="metricAssists">Assists</button>
  </div>

  <p class="assist-note" id="assistNote" style="display:none;">
    Approximate — only counts assists from players who've also scored this tournament (ESPN has no standalone assists leaderboard).
  </p>

  <div class="meta-row">
    <span class="dot" id="statusDot"></span>
    <span id="statusText">Loading…</span>
  </div>

  <div id="banner" class="banner" style="display:none;"></div>
  <div id="list" class="list"></div>

  <footer>
    Tournament data via ESPN · All-time data via Wikipedia
  </footer>
</div>

<script>
(function () {
  // Unofficial ESPN endpoint (no key, no documented ToS/rate limit) — could
  // change or disappear without notice, but it's the only free source that
  // returns a complete, accurate, pre-aggregated leaderboard.
  const STATS_URL = "https://site.api.espn.com/apis/site/v2/sports/soccer/fifa.world/statistics";
  // MediaWiki's action API supports anonymous CORS via origin=* — no key needed.
  // Section 1 of this article is exactly the "Overall top goalscorers" table,
  // which Wikipedia editors keep updated for active players (including the
  // current tournament), so nothing about who's active/retired is hardcoded.
  const WIKI_URL = "https://en.wikipedia.org/w/api.php?action=parse&page=List_of_FIFA_World_Cup_top_goalscorers&format=json&formatversion=2&prop=text&section=1&origin=*";
  const WIKI_API = "https://en.wikipedia.org/w/api.php";
  const POLL_MS = 60000;

  // name/wikiTitle -> thumbnail URL ("" means looked up, no image found).
  // Persisted for the page session so repeat polls don't re-fetch photos.
  const thumbnailCache = new Map();

  const refreshBtn = document.getElementById("refreshBtn");
  const tabTournamentBtn = document.getElementById("tabTournament");
  const tabAllTimeBtn = document.getElementById("tabAllTime");
  const metricToggle = document.getElementById("metricToggle");
  const metricGoalsBtn = document.getElementById("metricGoals");
  const metricAssistsBtn = document.getElementById("metricAssists");
  const assistNote = document.getElementById("assistNote");
  const statusDot = document.getElementById("statusDot");
  const statusText = document.getElementById("statusText");
  const banner = document.getElementById("banner");
  const listEl = document.getElementById("list");

  let tournamentScorers = [];
  let allTimeScorers = [];
  let allTimeLoaded = false;
  let activeTab = "tournament";
  let metricMode = "goals"; // "goals" | "assists" — assists only applies to the tournament tab
  let inFlight = false;

  async function fetchJSON(url) {
    let res;
    try {
      res = await fetch(url);
    } catch {
      throw new Error("Network error — check your connection.");
    }
    if (res.status === 429) throw new Error("Rate limited by the API — try again shortly.");
    if (!res.ok) throw new Error("API error (HTTP " + res.status + ").");
    try {
      return await res.json();
    } catch {
      throw new Error("Received an unexpected response from the API.");
    }
  }

  // Batched lookup of Wikipedia infobox photos for a list of page titles —
  // works for any notable footballer, active or retired, so no image needs
  // to be hardcoded or sourced per-player.
  async function fetchWikiThumbnails(titles) {
    if (!titles.length) return {};
    const params = new URLSearchParams({
      action: "query",
      prop: "pageimages",
      piprop: "thumbnail",
      pithumbsize: "120",
      titles: titles.join("|"),
      redirects: "1",
      format: "json",
      formatversion: "2",
      origin: "*",
    });
    const map = {};
    try {
      const data = await fetchJSON(`${WIKI_API}?${params.toString()}`);
      const query = data.query || {};
      const pages = query.pages || [];
      const redirectFrom = {};
      if (Array.isArray(query.redirects)) {
        for (const r of query.redirects) redirectFrom[r.to] = r.from;
      }
      for (const page of pages) {
        const url = page.thumbnail && page.thumbnail.source;
        if (!url) continue;
        map[page.title] = url;
        const original = redirectFrom[page.title];
        if (original) map[original] = url;
      }
    } catch {
      /* photo lookup failing shouldn't block showing scores — fall through to initials */
    }
    return map;
  }

  async function ensureThumbnails(items) {
    const missing = [...new Set(
      items.filter((it) => !it.photo && !thumbnailCache.has(it.wikiTitle)).map((it) => it.wikiTitle)
    )];
    // MediaWiki caps anonymous batched title lookups at 50 per request.
    for (let i = 0; i < missing.length; i += 50) {
      const batch = missing.slice(i, i + 50);
      const fetched = await fetchWikiThumbnails(batch);
      for (const title of batch) thumbnailCache.set(title, fetched[title] || "");
    }
    for (const it of items) {
      if (!it.photo) it.photo = thumbnailCache.get(it.wikiTitle) || "";
    }
  }

  function setStatus(mode, text) {
    statusDot.className = "dot" + (mode === "live" ? " live" : mode === "error" ? " error" : "");
    statusText.textContent = text;
  }

  function showBanner(kind, message) {
    if (!message) {
      banner.style.display = "none";
      return;
    }
    banner.style.display = "block";
    banner.className = "banner" + (kind === "error" ? " error" : "");
    banner.textContent = message;
  }

  function initials(name) {
    return name
      .split(/\s+/)
      .filter(Boolean)
      .slice(0, 2)
      .map((p) => p[0].toUpperCase())
      .join("");
  }

  // Parses the "Overall top goalscorers" wikitable out of Wikipedia's
  // rendered HTML. Rows for players tied on rank (e.g. sharing a rank via
  // rowspan) omit the rank/goals cells, so those are carried forward from
  // the previous row that had them.
  function parseAllTimeTable(doc) {
    const table = doc.querySelector("table.wikitable.sortable");
    if (!table) return [];
    const list = [];
    let lastGoals = 0;
    for (const row of table.rows) {
      const cells = Array.from(row.children);
      if (!cells.length) continue;
      if (cells[0].tagName === "TH" && cells[0].getAttribute("scope") === "col") continue; // header row
      const goalsThIdx = cells.findIndex((c) => c.tagName === "TH");
      let idx, goals;
      if (goalsThIdx !== -1) {
        goals = parseInt(cells[goalsThIdx].textContent.trim(), 10) || 0;
        idx = 1; // cells[0] is rank
      } else {
        goals = lastGoals; // continuation row, rank+goals inherited
        idx = 0;
      }
      lastGoals = goals;

      const playerCell = cells[idx];
      const teamCell = cells[idx + 1];
      if (!playerCell || !teamCell) continue;
      const nameLink = playerCell.querySelector("a");
      const name = (nameLink ? nameLink.textContent : playerCell.textContent).trim();
      const wikiTitle = (nameLink && nameLink.getAttribute("title")) || name;
      const teamLinks = teamCell.querySelectorAll("a");
      const team = (teamLinks.length ? teamLinks[teamLinks.length - 1].textContent : teamCell.textContent).trim();
      if (name) list.push({ name, team, goals, photo: "", wikiTitle });
    }
    return list.slice(0, 20); // only the top 20 are ever rendered
  }

  async function loadAllTime() {
    if (inFlight) return;
    inFlight = true;
    refreshBtn.disabled = true;
    setStatus("loading", allTimeLoaded ? "Refreshing…" : "Loading…");

    try {
      const data = await fetchJSON(WIKI_URL);
      const html = data.parse && data.parse.text;
      const doc = new DOMParser().parseFromString(html || "", "text/html");
      allTimeScorers = parseAllTimeTable(doc);
      allTimeLoaded = true;
      await ensureThumbnails(allTimeScorers);
      render();
      setStatus("live", "Live · last updated " + new Date().toLocaleTimeString());
      showBanner(null);
    } catch (err) {
      setStatus("error", "Update failed");
      showBanner("error", err.message || "Could not load the all-time list.");
    } finally {
      inFlight = false;
      refreshBtn.disabled = false;
    }
  }

  function render() {
    const isAssists = activeTab === "tournament" && metricMode === "assists";
    const pool = activeTab === "alltime" ? allTimeScorers : tournamentScorers;
    const scorers = isAssists
      ? [...pool].sort((a, b) => (b.assists || 0) - (a.assists || 0)).slice(0, 20)
      : pool.slice(0, 20);

    assistNote.style.display = isAssists && scorers.length > 0 ? "block" : "none";

    if (scorers.length === 0) {
      listEl.innerHTML = "";
      const emptyMsg = activeTab === "alltime"
        ? "Couldn't load the all-time list — try refreshing."
        : isAssists
          ? "No assists recorded yet — check back once the tournament kicks off."
          : "No goals scored yet — check back once the tournament kicks off.";
      showBanner("info", emptyMsg);
      return;
    }
    showBanner(null);
    listEl.innerHTML = scorers
      .map((s, i) => {
        const rank = i + 1;
        const topClass = rank <= 3 ? " top" + rank : "";
        const photo = s.photo
          ? `<img class="photo" src="${s.photo}" alt="" loading="lazy" onerror="this.replaceWith(Object.assign(document.createElement('div'),{className:'avatar-fallback',textContent:'${initials(s.name)}'}))">`
          : `<div class="avatar-fallback">${initials(s.name)}</div>`;
        const metricValue = isAssists ? (s.assists || 0) : s.goals;
        return `
          <div class="row${topClass}">
            <div class="rank">${rank}</div>
            ${photo}
            <div class="info">
              <div class="player-name">${escapeHtml(s.name)}</div>
              <div class="team-name">${escapeHtml(s.team)}</div>
            </div>
            <div class="goals">${metricValue}</div>
          </div>`;
      })
      .join("");
  }

  function escapeHtml(str) {
    return str.replace(/[&<>"']/g, (c) => ({
      "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;"
    }[c]));
  }

  async function loadTopScorers({ isFirstLoad } = {}) {
    if (inFlight) return;
    inFlight = true;
    refreshBtn.disabled = true;
    if (isFirstLoad) setStatus("loading", "Loading…");
    else setStatus("loading", "Refreshing…");

    try {
      const data = await fetchJSON(STATS_URL);
      const stats = Array.isArray(data.stats) ? data.stats : [];
      const goalsLeaders = stats.find((s) => s.name === "goalsLeaders");
      const leaders = goalsLeaders && Array.isArray(goalsLeaders.leaders)
        ? goalsLeaders.leaders
        : [];

      tournamentScorers = leaders
        .map((l) => {
          const name = l.athlete && l.athlete.displayName || "";
          const playerStats = (l.athlete && l.athlete.statistics) || [];
          const assistsStat = playerStats.find((st) => st.name === "goalAssists");
          return {
            name,
            wikiTitle: name,
            team: l.athlete && l.athlete.team && l.athlete.team.name || "",
            photo: l.athlete && l.athlete.headshot && l.athlete.headshot.href || "",
            goals: l.value,
            assists: assistsStat ? assistsStat.value : 0,
          };
        })
        .filter((s) => s.name)
        .sort((a, b) => b.goals - a.goals)
        // Keep a wider pool than the top 20 shown by goals — the assists
        // view re-sorts this same pool, so it needs more than 20 candidates
        // to be a reasonable (if still approximate) assists ranking.
        .slice(0, 50);

      await ensureThumbnails(tournamentScorers);
      render();
      setStatus("live", "Live · last updated " + new Date().toLocaleTimeString());
      showBanner(null);
    } catch (err) {
      setStatus("error", "Update failed");
      showBanner("error", err.message || "Something went wrong while fetching data.");
    } finally {
      inFlight = false;
      refreshBtn.disabled = false;
    }
  }

  function setActiveTab(tab) {
    if (activeTab === tab) return;
    activeTab = tab;
    tabTournamentBtn.classList.toggle("active", tab === "tournament");
    tabAllTimeBtn.classList.toggle("active", tab === "alltime");
    metricToggle.style.display = tab === "tournament" ? "flex" : "none";
    if (tab === "alltime" && !allTimeLoaded) {
      loadAllTime();
    } else {
      render();
    }
  }

  function setMetricMode(mode) {
    if (metricMode === mode) return;
    metricMode = mode;
    metricGoalsBtn.classList.toggle("active", mode === "goals");
    metricAssistsBtn.classList.toggle("active", mode === "assists");
    render();
  }

  tabTournamentBtn.addEventListener("click", () => setActiveTab("tournament"));
  tabAllTimeBtn.addEventListener("click", () => setActiveTab("alltime"));
  metricGoalsBtn.addEventListener("click", () => setMetricMode("goals"));
  metricAssistsBtn.addEventListener("click", () => setMetricMode("assists"));

  refreshBtn.addEventListener("click", () => {
    if (activeTab === "alltime") loadAllTime();
    else loadTopScorers({ isFirstLoad: false });
  });
  loadTopScorers({ isFirstLoad: true });
  setInterval(() => {
    if (activeTab === "tournament") loadTopScorers({ isFirstLoad: false });
  }, POLL_MS);
})();
</script>
